name: Price Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: price-alerts
  cancel-in-progress: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      env:
  NTFY_TOPIC: bevan-rotation-alerts
  NTFY_SERVER: https://ntfy.sh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache triggered.json
        uses: actions/cache@v4
        with:
          path: triggered.json
          key: triggered-${{ runner.os }}-${{ hashFiles('triggered.json') }}
          restore-keys: |
            triggered-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run price alert script
        run: python price_alerts.py
