name: Price Alerts

on:
  schedule:
    - cron: '*/5 8-23 * * 1-5'
  workflow_dispatch:

concurrency:
  group: price-alerts
  cancel-in-progress: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
        
      - name: Run price alert script
        run: python price_alerts.py

      - - name: Save triggered state
  run: |
    git config user.name "Price Alert Bot"
    git config user.email "actions@github.com"

    git add triggered.json

    git commit -m "Update triggered alerts" || echo "No changes"

    git pull --rebase origin main || echo "Nothing to pull"

    git push || echo "Nothing to push"
