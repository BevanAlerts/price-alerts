name: Price Alerts

on:
  schedule:
    - cron: '*/5 9-23 * * 1-5'
    - cron: '*/5 0 * * 2-6'
  workflow_dispatch:

concurrency:
  group: price-alerts
  cancel-in-progress: true

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price alert script
        run: python price_alerts.py
